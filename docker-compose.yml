services:
  worldweaver:
    build: .
    ports:
      - "8000:8000"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - DEMO_MODE=true
      - DAILY_LLM_LIMIT=500
      - BUILDER_PASSWORD=${BUILDER_PASSWORD:-worldweaver}
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
